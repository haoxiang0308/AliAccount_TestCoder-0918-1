# Application Configuration
[app]
name = "MyApplication"
version = "1.0.0"
debug = true

[server]
host = "localhost"
port = 8080
timeout = 30

[database]
host = "localhost"
port = 5432
name = "myapp_db"
username = "user"
password = "password"

[logging]
level = "info"
file = "app.log"

[features]
enable_cache = true
max_connections = 100