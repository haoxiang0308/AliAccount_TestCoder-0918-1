---
- name: Restart a service
  hosts: localhost
  become: yes
  tasks:
    - name: Restart the specified service
      systemd:
        name: "{{ service_name | default('nginx') }}"
        state: restarted
      notify: Wait for service to be running

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

  handlers:
    - name: Wait for service to be running
      wait_for:
        port: "{{ service_port | default(80) }}"
        delay: 2
        timeout: 30