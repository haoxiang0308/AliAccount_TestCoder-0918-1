[database]
host = localhost
port = 5432
username = dbuser
password = dbpassword123
database_name = myapplication

[connection_pool]
min_connections = 5
max_connections = 20
connection_timeout = 30

[security]
ssl_enabled = true
ssl_cert_path = /etc/ssl/certs/db_cert.pem
ssl_key_path = /etc/ssl/private/db_key.pem