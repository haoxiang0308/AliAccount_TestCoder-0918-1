# Application Configuration
title = "My Application Configuration"

[database]
host = "localhost"
port = 5432
username = "admin"
password = "secret123"
database_name = "myapp_db"

[server]
host = "0.0.0.0"
port = 8080
debug = true
max_connections = 100

[logging]
level = "info"
output = "file"
file_path = "/var/log/myapp.log"

[features]
enable_cache = true
cache_ttl = 3600
rate_limiting = true
max_requests_per_minute = 60