# Application Configuration
title = "My Application Configuration"

[database]
host = "localhost"
port = 5432
username = "admin"
password = "secure_password"
database_name = "myapp_db"

[server]
host = "0.0.0.0"
port = 8080
debug = true
log_level = "info"

[authentication]
jwt_secret = "your_jwt_secret_key"
token_expiry = 3600

[features]
enable_caching = true
max_connections = 100
timeout_seconds = 30

[logging]
file_path = "/var/log/myapp.log"
max_size = 10
max_backups = 5