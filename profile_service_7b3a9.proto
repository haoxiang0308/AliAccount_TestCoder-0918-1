syntax = "proto3";

package profile;

// Сервис для получения профиля пользователя
service ProfileService {
  // Метод для получения профиля по идентификатору
  rpc GetProfile (GetProfileRequest) returns (GetProfileResponse);
}

// Запрос на получение профиля
message GetProfileRequest {
  string user_id = 1;
}

// Ответ с профилем пользователя
message GetProfileResponse {
  User user = 1;
  bool success = 2;
  string message = 3;
}

// Структура данных пользователя
message User {
  string user_id = 1;
  string username = 2;
  string email = 3;
  string full_name = 4;
  int32 age = 5;
  string avatar_url = 6;
  repeated string roles = 7;
  string created_at = 8;
  string updated_at = 9;
}