syntax = "proto3";

package profile_api;

// Сообщение профиля пользователя
message UserProfile {
  string user_id = 1;
  string display_name = 2;
  string email = 3;
  string first_name = 4;
  string last_name = 5;
  int32 age = 6;
  string bio = 7;
  string avatar_url = 8;
  repeated string interests = 9;
  int64 created_at = 10;
  int64 updated_at = 11;
}

// Запрос на получение профиля
message RetrieveProfileRequest {
  string user_id = 1;
}

// Ответ с профилем
message RetrieveProfileResponse {
  UserProfile profile = 1;
  bool is_success = 2;
  string error_message = 3;
}

// Определение сервиса получения профиля
service UserProfileService {
  // Метод для получения профиля пользователя
  rpc GetUserProfile(RetrieveProfileRequest) returns (RetrieveProfileResponse);
}