syntax = "proto3";

package profile;

// Profile message definition
message Profile {
  int32 id = 1;
  string name = 2;
  string email = 3;
  string bio = 4;
  int32 age = 5;
  string avatar_url = 6;
  repeated string skills = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
}

// Request message for getting a profile
message GetProfileRequest {
  int32 user_id = 1;
}

// Response message for getting a profile
message GetProfileResponse {
  Profile profile = 1;
  bool success = 2;
  string message = 3;
}

// Profile service definition
service ProfileService {
  rpc GetProfile (GetProfileRequest) returns (GetProfileResponse);
  rpc GetMyProfile (Empty) returns (GetProfileResponse);
}

// Empty message for requests that don't need parameters
message Empty {}