# Application Configuration

[server]
host = "localhost"
port = 8080
debug = false

[database]
host = "localhost"
port = 5432
name = "myapp"
user = "dbuser"
password = "dbpassword"
ssl = true

[logging]
level = "INFO"
file = "/var/log/myapp.log"
max_size = "10MB"
backup_count = 5

[features]
enable_cache = true
cache_ttl = 3600
enable_metrics = true
metrics_port = 9090

[api]
rate_limit = 1000
timeout = 30
cors_enabled = true