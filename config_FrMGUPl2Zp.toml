# Application Configuration

[server]
host = "0.0.0.0"
port = 8080
debug = false

[database]
host = "localhost"
port = 5432
name = "myapp"
user = "dbuser"
password = "dbpassword"
ssl_enabled = true

[logging]
level = "INFO"
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
file = "/var/log/myapp.log"

[features]
enable_cache = true
cache_ttl = 3600
max_connections = 100

[api]
rate_limit = 1000
rate_limit_window = 3600
cors_enabled = true