<div class="user-profile-card">
  <h2>User Profile</h2>
  <div class="user-info">
    <p><strong>Name:</strong> {{ user.name }}</p>
    <p><strong>Username:</strong> {{ user.username }}</p>
    <p><strong>Email:</strong> {{ user.email }}</p>
    <p *ngIf="user.bio"><strong>Bio:</strong> {{ user.bio }}</p>
  </div>
</div>
