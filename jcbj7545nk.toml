# Application Configuration File

[app]
name = "My Application"
version = "1.0.0"
debug = true

[database]
host = "localhost"
port = 5432
name = "myapp_db"
username = "db_user"
password = "secure_password"

[server]
host = "0.0.0.0"
port = 8080
timeout = 30

[logging]
level = "info"
format = "json"
output = "stdout"

[features]
enable_cache = true
max_connections = 100
rate_limit = 1000