syntax = "proto3";

package profile;

// Profile message definition
message Profile {
  int32 id = 1;
  string username = 2;
  string email = 3;
  string first_name = 4;
  string last_name = 5;
  int32 age = 6;
  string bio = 7;
  string avatar_url = 8;
  repeated string interests = 9;
  int64 created_at = 10;
  int64 updated_at = 11;
}

// Request message for getting a profile
message GetProfileRequest {
  int32 id = 1;
}

// Response message for getting a profile
message GetProfileResponse {
  Profile profile = 1;
  bool success = 2;
  string message = 3;
}

// Service definition
service ProfileService {
  rpc GetProfile (GetProfileRequest) returns (GetProfileResponse);
}