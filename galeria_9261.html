<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Imagens - CSS Grid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            grid-gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            background-color: #fff;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .gallery-item .caption {
            padding: 15px;
            background-color: #fff;
            text-align: center;
        }

        .gallery-item .caption h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 5px;
        }

        .gallery-item .caption p {
            font-size: 14px;
            color: #666;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                grid-gap: 15px;
            }
        }

        @media (max-width: 480px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                grid-gap: 10px;
            }
        }
    </style>
</head>
<body>
    <h1>Galeria de Imagens</h1>
    
    <div class="gallery">
        <div class="gallery-item">
            <img src="https://picsum.photos/400/300?random=1" alt="Imagem 1">
            <div class="caption">
                <h3>Imagem 1</h3>
                <p>Descrição da imagem</p>
            </div>
        </div>
        <div class="gallery-item">
            <img src="https://picsum.photos/400/300?random=2" alt="Imagem 2">
            <div class="caption">
                <h3>Imagem 2</h3>
                <p>Descrição da imagem</p>
            </div>
        </div>
        <div class="gallery-item">

            <div class="caption">

            </div>
        </div>
        <div class="gallery-item">

</body>
</html>
