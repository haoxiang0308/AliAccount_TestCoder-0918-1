# Application Configuration
title = "My Application Configuration"

[database]
host = "localhost"
port = 5432
username = "app_user"
password = "secure_password"
database_name = "my_app_db"

[server]
host = "0.0.0.0"
port = 8080
debug = true
max_connections = 100

[logging]
level = "info"
file = "app.log"
max_size = "10MB"
max_backups = 5

[features]
enable_cache = true
cache_ttl = 3600
rate_limiting = true
max_requests_per_minute = 60