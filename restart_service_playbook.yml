---
- name: Restart Service Playbook
  hosts: localhost
  become: yes
  tasks:
    - name: Restart service
      systemd:
        name: "{{ service_name | default('nginx') }}"
        state: restarted
      notify: 
        - wait for service

  handlers:
    - name: wait for service
      wait_for:
        port: "{{ service_port | default(80) }}"
        delay: 5
        timeout: 30