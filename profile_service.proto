syntax = "proto3";

package profile;

// Определение сообщения профиля
message Profile {
  string id = 1;
  string username = 2;
  string email = 3;
  string full_name = 4;
  int32 age = 5;
  string avatar_url = 6;
  repeated string roles = 7;
  map<string, string> metadata = 8;
}

// Запрос получения профиля
message GetProfileRequest {
  string user_id = 1;
}

// Ответ получения профиля
message GetProfileResponse {
  Profile profile = 1;
  bool success = 2;
  string message = 3;
}

// Сервис для получения профиля
service ProfileService {
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
  rpc GetMyProfile(EmptyRequest) returns (GetProfileResponse);
}

// Пустой запрос для получения собственного профиля
message EmptyRequest {}