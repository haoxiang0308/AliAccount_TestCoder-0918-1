syntax = "proto3";

package profile;

// Определение сообщения профиля
message Profile {
  string id = 1;
  string username = 2;
  string email = 3;
  string first_name = 4;
  string last_name = 5;
  int32 age = 6;
  string bio = 7;
  string avatar_url = 8;
  repeated string tags = 9;
  int64 created_at = 10;
  int64 updated_at = 11;
}

// Запрос на получение профиля
message GetProfileRequest {
  string profile_id = 1;
}

// Ответ с профилем
message GetProfileResponse {
  Profile profile = 1;
  bool success = 2;
  string error_message = 3;
}

// Определение сервиса
service ProfileService {
  // Метод для получения профиля по ID
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
}