syntax = "proto3";

package profile;

// Определение сообщения профиля
message Profile {
  string id = 1;
  string username = 2;
  string email = 3;
  string first_name = 4;
  string last_name = 5;
  string bio = 6;
  string avatar_url = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
}

// Запрос получения профиля по ID
message GetProfileRequest {
  string profile_id = 1;
}

// Ответ с профилем
message GetProfileResponse {
  Profile profile = 1;
  bool success = 2;
  string error_message = 3;
}

// Сервис получения профиля
service ProfileService {
  rpc GetProfile (GetProfileRequest) returns (GetProfileResponse);
}