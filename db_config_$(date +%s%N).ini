[database]
host = localhost
port = 5432
username = dbuser
password = secret_password
database_name = myapp_db
ssl_mode = require
connection_timeout = 30
pool_size = 10

[logging]
log_level = INFO
log_file = /var/log/myapp/database.log

[backup]
backup_enabled = true
backup_path = /backups/database
backup_retention_days = 7