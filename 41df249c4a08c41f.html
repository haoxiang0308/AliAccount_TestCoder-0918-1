<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de Navegación</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        
        nav {
            background-color: #333;
            overflow: hidden;
            border-radius: 5px;
        }
        
        nav a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
        }
        
        nav a:hover {
            background-color: #555;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ejemplo de Menú de Navegación</h1>
        
        <nav>
            <a href="#home">Inicio</a>
            <a href="#about">Acerca de</a>
            <a href="#services">Servicios</a>
            <a href="#portfolio">Portafolio</a>
            <a href="#contact">Contacto</a>
        </nav>
        
        <div id="content">
            <p>Este es un ejemplo de menú de navegación en HTML con enlaces.</p>
            <p>Haz clic en cualquiera de los enlaces del menú superior para navegar.</p>
        </div>
    </div>
</body>
</html>
